<section class="auth-shell">
  <div class="auth-shell__panel">
    <form class="auth-card" [formGroup]="registerForm" (ngSubmit)="submitRegisterAsync()">
      <div>
        <p class="eyebrow">New account</p>
        <h2>Register</h2>
      </div>

      <p class="auth-card__text">
        Use any valid email address and a password with at least 8 characters.
      </p>

      <p *ngIf="errorMessage" class="notice notice--error">{{ errorMessage }}</p>
      <p *ngIf="successMessage" class="notice notice--success">{{ successMessage }}</p>

      <label class="field">
        <span>Email</span>
        <input type="email" formControlName="email" placeholder="you@darwin.local" />
        <small *ngIf="fieldError('email')" class="field__error">{{ fieldError('email') }}</small>
      </label>

      <label class="field">
        <span>Password</span>
        <input type="password" formControlName="password" placeholder="At least 8 characters" />
        <small *ngIf="fieldError('password')" class="field__error">{{ fieldError('password') }}</small>
      </label>

      <button type="submit" class="button button--primary" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Creating account...' : 'Register' }}
      </button>

      <p class="auth-card__text">
        Already registered?
        <a routerLink="/login">Return to login</a>
      </p>
    </form>
  </div>
</section>
